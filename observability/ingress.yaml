apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    konghq.com/strip-path: "true"
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /monitor
            pathType: ImplementationSpecific
            backend:
              service:
                name: grafana
                port:
                  number: 3000
